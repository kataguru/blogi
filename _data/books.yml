- title: "Kesytä moderni orjuus – Ohjaa omaa elämääsi"
  status: "Toinen painos / toimitettu versio 2026"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee modernia orjuutta ilman perinteistä orjuuskuvaa. Kyse ei ole kahleistaan tietoisesta ihmisestä, vaan hitaasti rakentuvasta sidosten verkosta, jossa työ, velka, kulutus, teknologia, sosiaalinen hyväksyntä, huomion kaappaus ja jatkuva saatavilla oleminen alkavat ohjata ihmisen elämää.
    - >
      Teoksen perusväite on, että moderni orjuus toimii usein ilman näkyvää pakottajaa. Järjestelmä ei tarvitse yhtä pahaa toimijaa, jos rakenteet, kannustimet ja tottumukset riittävät ohjaamaan ihmisen samaan suuntaan.
    - >
      Kirja ei tarjoa helppoa irtiottofantasiaa, vaan käytännöllisiä korjausliikkeitä: omien sidosten tunnistamista, huomion suojaamista, kuorman vähentämistä ja päätösvallan palauttamista itselle.

- title: "Kitka elämässäsi – Miten teet vastuksesta voimavaran"
  status: "Toinen painos / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee kitkaa näkymättömänä vastuksena, joka saa elämän tuntumaan raskaammalta kuin sen pitäisi. Kitka voi olla epäselvä tavoite, huonosti rakennettu ympäristö, jatkuva keskeytys, väärä rytmi, liiallinen velvoite tai liian suuri kuorma suhteessa käytettävissä oleviin resursseihin.
    - >
      Teoksen ydinajatus on, että kaikkea kitkaa ei pidä poistaa. Vähäinen kitka voi suojata virheiltä ja ohjata parempiin valintoihin. Liiallinen kitka taas pysäyttää, kuluttaa ja kaventaa vaihtoehtoja.
    - >
      Kirja antaa mallin kitkan tunnistamiseen ja hallintaan: missä kohtaa vastus kehittää, missä se kuluttaa ja missä se estää toiminnan kokonaan.

- title: "Elämän tase – Pääomat, velat ja kassavirta"
  status: "Ensipainos / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja tarkastelee elämää tilinpäätöksen kaltaisena kokonaisuutena. Ihmisellä ei ole vain rahaa, menoja ja tuloja, vaan myös fyysistä, henkistä, sosiaalista, ajallista, rakenteellista ja taloudellista pääomaa.
    - >
      Teoksen ydin on taseajattelu. Elämää ei tarkastella yksittäisinä tunteina, tavoitteina tai kriiseinä, vaan kokonaisuutena, jossa jokainen valinta vaikuttaa pääomiin, velkoihin ja kassavirtaan.
    - >
      Kirja antaa mallin oman elämän taloudettomalle kirjanpidolle: mitä kannattaa vahvistaa, mitä pitää lyhentää, mikä vuotaa jatkuvasti ja missä kohtaa kassavirta ei enää riitä ylläpitämään nykyistä elämäntapaa.

- title: "Ajan arkkitehti – Suunnittele elämä, jossa on tilaa olennaiselle"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee aikaa järjestelmänä, ei pelkkänä kalenterin täyttönä. Sen lähtökohta on kokemus, jossa ihminen voi olla tehokas ja järjestelmällinen, mutta silti menettää merkityksen, palautumisen, läsnäolon ja oman suunnan.
    - >
      Teos haastaa ajatuksen ajasta ulkoisena resurssina, jota hallitaan minuuteilla, tehtävälistoilla ja sovelluksilla. Aika on myös fyysinen, biologinen, psykologinen, sosiaalinen ja eksistentiaalinen järjestelmä.
    - >
      Kirja antaa välineitä oman aikarakenteen suunnitteluun: mihin aika todella kuluu, mikä hajottaa kapasiteettia ja milloin tehokkuus alkaa muuttua itseään syöväksi järjestelmäksi.

- title: "Ei pelkkää rakkautta – Opas miehelle, joka haluaa toimivan suhteen"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee parisuhdetta järjestelmänä, jossa pelkkä rakkaus ei aina riitä pitämään yhteyttä elossa. Sen lähtökohta on miehen kokemus tilanteesta, jossa jokin on lakannut virtaamasta: läheisyys, keskustelu, huumori, kosketus tai tunne siitä, että toinen todella näkee.
    - >
      Teos tarkastelee suhdetta rakenteiden, palautteen, vastuun, turvallisuuden ja vuorovaikutuksen kautta. Parisuhde ei yleensä hajoa yhdestä suuresta virheestä, vaan pienistä toistuvista katkoksista.
    - >
      Kirjan tarkoitus ei ole syyllistää miestä tai kumppania, vaan antaa malli, jolla suhdetta voi tarkastella korjattavana järjestelmänä.

- title: "Himon vallassa – Addiktiivisten järjestelmien tunnistaminen ja purkaminen"
  status: "RC9 / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee addiktiota järjestelmänä, ei moraalisena epäonnistumisena tai yksinkertaisena tahdonvoiman puutteena. Himo syntyy, vahvistuu ja pysyy yllä, koska se tuottaa hetkellisen helpotuksen, lohdun, jännityksen, kontrollin tunteen tai pakotien epämiellyttävistä ajatuksista.
    - >
      Teoksen ydin on addiktiivisen kierteen mallintaminen: mitä addiktio tarvitsee ylläpysyäkseen, missä kohtaa palkkio vahvistaa himoa ja miten ympäristö, stressi, häpeä, yksinäisyys, tylsyys ja impulssi muodostavat palautesilmukan.
    - >
      Kirja etsii konkreettisia purkupisteitä: laukaisevien tilanteiden tunnistamista, palkkion uudelleenohjausta, ympäristön muuttamista ja toipumista tukevien rakenteiden rakentamista.

- title: "Elämän tarkoitus – Merkityksellisen elämän järjestelmä"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee arvoja ja tarkoitusta loogisena järjestelmänä. Sen perusväite on, että merkitys ei ole vain abstrakti tunne, jota joko löytyy tai ei löydy.
    - >
      Teos lähtee siitä, että loputtomien mahdollisuuksien aikakausi lupaa vapautta, mutta voi käytännössä tuottaa lamaannusta, levottomuutta ja tyytymättömyyttä.
    - >
      Kirja antaa mallin siihen, miten ihminen voi tunnistaa omat arvonsa, erottaa kestävän merkityksen hetkellisestä halusta ja rakentaa elämäänsä päätöksenteon rungon.

- title: "AFRS – Järjestelmä luovaan työhön"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee luovaa työtä järjestelmänä, jossa ideat, energia, palaute, muokkaus ja valmiiksi saattaminen pitää saada toimimaan yhdessä.
    - >
      Teoksen ytimessä on AFRS, Adaptive Fit & Recycle System. Malli auttaa tunnistamaan, miksi luova työ jumiutuu: idea ei sovi tekijän nykyisiin resursseihin, palaute jää hyödyntämättä, keskeneräisyys muuttuu taakaksi tai vanha materiaali jää käyttämättä.
    - >
      Kirja toimii myös omana case studynaan ja näyttää, miten raakaa materiaalia sovitetaan, kierrätetään, korjataan, rajataan ja muutetaan valmiiksi tuotokseksi.

- title: "Kone, joka kestää – kun elämä vastustaa"
  status: "Aikaisempi versio / kansio 2025"
  availability: "Lukumuoto tulossa."
  description:
    - >
      Kirja käsittelee toimintakykyä tilanteissa, joissa elämä vastustaa eikä ihminen pysty etenemään pelkällä tahdonvoimalla. Sen näkökulma on järjestelmässä, joka pitää saada käynnistymään, kestämään kuormaa ja palautumaan häiriöistä.
    - >
      Teos rakentaa pohjaa myöhemmälle Kone, joka kestää -toisen painoksen mallille: matalatehon, energiavuotojen, reaktivaation ja resilienssin tarkastelulle käytännön toimintamallina.
    - >
      Tarkoitus ei ole tehdä ihmisestä kovempaa, vaan rakentaa järjestelmä, joka ei kaadu heti, kun olosuhteet muuttuvat vaikeiksi.

- title: "Kone, joka kestää – 2. painos"
  status: "Toinen painos / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee toimintakykyä järjestelmänä, joka pitää rakentaa kestämään sekä arjen kuormitusta että yllättäviä stressitiloja. Ongelma ei aina ole yksittäinen väsymys, vaan rakenteellinen heikkous: energiavuoto, väärä ajoitus, katoava momentum, matalateho tai jumi.
    - >
      Teoksen toinen painos laajentaa perusajatuksen mallikirjaksi. Tarkoitus ei ole antaa vain irrallisia ohjeita, vaan pohjapiirros oman toimintakyvyn tunnistamiseen, ennakointiin ja korjaamiseen.
    - >
      Kun järjestelmän heikot kohdat tulevat näkyviin, niitä voidaan käsitellä protokollina eikä luonteen puutteina.

- title: "Ilon koneisto"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee iloa ja tyytyväisyyttä järjestelmänä, ei pelkkänä sattumana tai ulkoisten olosuhteiden tuotteena. Sen lähtökohta on havainto, että jatkuva virikkeiden, nautinnon ja onnen jahtaaminen voi jättää ihmisen tyhjemmäksi kuin ennen.
    - >
      Teos tarkastelee ilon tuotantojärjestelmää kehon, ravinnon, liikkeen, aivokemian, palautumisen ja merkityksen kautta.
    - >
      Tavoitteena ei ole tehdä elämästä jatkuvaa nautintoa, vaan kalibroida järjestelmä uudelleen niin, että ihminen tunnistaa aidon ilon, matalan tason tyytyväisyyden ja ulkoisen hyväksynnän tuottaman keinotekoisen palkinnon erot.

- title: "Liber Obscura – Kiellettyjen psykostrategioiden kirja"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee mielen pimeitä kerroksia, tarttuvia ajatusrakenteita ja psykologisia strategioita järjestelmäkarttana. Se ei ole neutraali katsaus eikä manipulaation ihannointi, vaan yritys tehdä näkyväksi vaikutusmekanismeja, jotka muuten jäävät piiloon.
    - >
      Teoksen perusliike kulkee dekonstruktiosta refaktorointiin: ensin tunnistetaan mielen arkkitehtuuriin pesiytynyt rakenne, sitten puretaan sen logiikka ja lopulta rakennetaan toimivampi versio tilalle.
    - >
      Tavoitteena on siirtyä näkymättömien ohjelmien armoilta oman käyttöjärjestelmän tietoiseksi ylläpitäjäksi.

- title: "Narsistin käyttöliittymä – Analyysi ja vastastrategiat"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee narsistista toimintalogiikkaa käyttöliittymänä, jossa tavalliset vuorovaikutuksen protokollat eivät toimi odotetusti. Looginen argumentti, tunneilmaisu, vastavuoroisuus tai sovittelun yritys voi palautua takaisin syytöksenä, sumuverhona, devalvaationa tai suhteettomana raivona.
    - >
      Teoksen tarkoitus on antaa lukijalle analyyttinen malli tällaisten vuorovaikutustilanteiden tunnistamiseen ja hallintaan.
    - >
      Painopiste ei ole diagnoosien jakamisessa, vaan siinä, miten omaa järjestelmää suojataan, missä kohtaa raja pitää asettaa ja miksi narsistinen käyttöliittymä kuluttaa toisen ihmisen resursseja nopeasti.

- title: "Toimintamalli Neurodiverseille – Mittaa, Optimoi, Menesty"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee neurodiversiteettiä toimintamallin näkökulmasta. Sen tarkoitus ei ole tarjota diagnooseja tai lokeroida ihmisiä, vaan auttaa tunnistamaan, miten erilaiset aivot, ympäristöt, tehtävät, työkalut ja oppimistavat sopivat yhteen tai törmäävät toisiinsa.
    - >
      Teoksen malli etenee mittaamisesta optimointiin. Ensin tunnistetaan oma toimintaprofiili: vahvuudet, haasteet, kuormittavat tilanteet ja sopivat olosuhteet.
    - >
      Sen jälkeen rakennetaan käytännön mukautuksia, strategioita ja järjestelmiä, joiden avulla neurodiversiteetti ei jää pelkäksi selitykseksi, vaan muuttuu hallittavaksi toimintaympäristöksi.

- title: "Tunteiden logiikka – suhteiden säätöjärjestelmät"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee tunteita ja ihmissuhteita säätöjärjestelminä. Tunteet eivät ole vain hallitsemattomia purkauksia tai pehmeää vastapainoa järjelle, vaan signaaleja, palautetta ja säätöliikkeitä.
    - >
      Teos purkaa suhteiden toimintaa järjestelmäajattelun kautta: mitä tapahtuu, kun palaute ei kulje, rajat vuotavat, tulkinnat vääristyvät tai toinen ihminen reagoi vanhaan malliin eikä nykyiseen tilanteeseen.
    - >
      Tavoitteena on tehdä tunnesäätelystä ja vuorovaikutuksesta vähemmän mystistä ja enemmän ymmärrettävää, testattavaa ja korjattavaa.

- title: "Virta päälle – kun matalateho iskee"
  status: "Ensimmäinen painos / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee matalatehoa eli tilaa, jossa ihminen ei ole varsinaisesti rikki, mutta järjestelmä ei tuota normaalia toimintakykyä. Suoritus laskee, aloittaminen vaikeutuu, ärtymys kasvaa, vetäytyminen lisääntyy ja yksinkertaisetkin asiat alkavat vaatia suhteettoman paljon energiaa.
    - >
      Teoksen ydin on reaktivaation malli. Matalatehoa ei korjata pelkällä käskyllä piristyä, vaan tunnistamalla kuormituksen lähteet, palauttamalla järjestelmään pieni liike ja rakentamalla ympäristö, joka auttaa käynnistymään myös heikompina päivinä.
    - >
      Kyse on virran palauttamisesta, ei sankarillisesta ylisuorittamisesta.

- title: "Turning Point 14 & Flow – Käännekohta kehossa ja mielessä"
  status: "Syvennetty toinen painos / käsikirjoitus 2025"
  availability: "Lukumuoto tulossa."
  description:
    - >
      Kirja käsittelee 14 päivän tarkasti rajattua kehon ja aineenvaihdunnan korjausohjelmaa, jonka tavoitteena on kääntää suunta nopeasti ja mitattavasti.
    - >
      Se ei lähesty muutosta pelkkänä dieettinä, vaan fysiologisena resetointina: kehonkoostumuksen, aineenvaihdunnan, energian ja mielen selkeyden yhteisenä järjestelmänä.
    - >
      Syvennetty toinen painos laajentaa mallia flow-tilaan. Tavoitteena ei ole vain kevyempi keho, vaan toimintakykyisempi kokonaisuus.

- title: "Velattomana eläkkeelle – Tee terveydestä ja jaksamisesta pääomasi"
  status: "PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee elämän toista puoliskoa pääoman näkökulmasta. Terveys, jaksaminen, toimintakyky ja päätösvalta eivät ole vain hyvinvointiteemoja, vaan vapautta suojaavaa pääomaa, jota voi kasvattaa, kuluttaa tai menettää.
    - >
      Teoksen keskeinen käsite on metabolinen pääoma: kehon, mielen, elämäntapojen ja sosiaalisen ympäristön muodostama kokonaisuus, joka ratkaisee, kuinka paljon liikkumavaraa ihmisellä on iän, sairauksien, työn päättymisen ja hoivajärjestelmän paineessa.
    - >
      Kirja tarkastelee hoivakierteen riskiä järjestelmäongelmana. Tavoitteena on auttaa lukijaa tunnistamaan, miten omaa vapautta ja toimintakykyä voidaan suojata ennen kuin päätösvalta siirtyy oireille, lääkkeille, palveluketjuille tai muille ihmisille.

- title: "Itsenäisen nuoren selviytymisopas – Arjen koodinmurtaja"
  status: "KDP / PDF-versio 2025"
  availability: "PDF-versio tulossa ladattavaksi."
  description:
    - >
      Kirja käsittelee itsenäistymistä arjen järjestelmänä. Sen tarkoitus ei ole romantisoida vapautta eikä pelotella vastuulla, vaan näyttää, miten asuminen, raha, ruoka, terveys, paperiasiat, opiskelu, työ, ihmissuhteet ja kriisit muodostavat kokonaisuuden.
    - >
      Teos antaa nuorelle käytännöllisen käyttöohjeen siihen, mitä kukaan ei välttämättä ehdi opettaa: miten perustaidot, talous, päätökset, viranomaisasiat ja omat rajat pidetään hallinnassa ilman, että jokainen asia muuttuu kriisiksi.
    - >
      Kirjan perusajatus on, että itsenäisyys ei ole tunne vaan järjestelmä. Kun arjen perusrakenteet ovat näkyvissä, vapaus ei tarkoita ajelehtimista vaan kykyä tehdä parempia päätöksiä omilla resursseilla.
