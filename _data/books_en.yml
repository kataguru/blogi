- title: "Tame Modern Slavery - Control Your Own Life"
  status: "Second edition / published version 2026"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with modern slavery without the traditional image of slavery. It's not about a person
      aware of their chains, but a slowly building network of ties where work, debt, consumption,
      technology, social acceptance, attention grabbing and constant availability begin to guide a
      person's life.
    - >
      The basic argument of the work is that modern slavery often operates without a visible enforcer. The
      system doesn't need one bad actor if the structures, incentives and habits are enough to guide
      people in the same direction.
    - >
      The book does not offer an easy fantasy of letting go, but practical corrective measures:
      recognizing your own bonds, protecting your attention, reducing the load and returning decision-
      making power to yourself.
- title: "Friction in your life - How to turn resistance into an asset"
  status: "Second edition / PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with friction as an invisible resistance that makes life feel heavier than it should.
      Friction can be an unclear goal, a poorly constructed environment, constant interruption, a wrong
      rhythm, too much obligation, or too great a load relative to the available resources.
    - >
      The core idea of the piece is that not all friction should be removed. Low friction can protect
      against mistakes and lead to better choices. Excessive friction, on the other hand, stops, consumes
      and narrows the options.
    - >
      The book provides a model for identifying and managing friction: where does resistance develop,
      where does it consume, and where does it completely block action.
- title: "Life balance – Equity, liabilities and cash flow"
  status: "First edition / PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book examines life as an entity similar to financial statements. A person has not only money,
      expenses and income, but also physical, mental, social, temporal, structural and financial capital.
    - >
      The essence of the work is balanced thinking. Life is not viewed as individual hours, goals or
      crises, but as a whole, where every choice affects capital, debt and cash flow.
    - >
      The book provides a model for the uneconomic accounting of one's own life: what should be
      strengthened, what should be shortened, what is constantly leaking and at what point the cash flow
      is no longer sufficient to maintain the current lifestyle.
- title: "Architect of Time - Design a life with room for the essential"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with time as a system, not just as filling in a calendar. Its starting point is an
      experience where a person can be efficient and systematic, but still lose meaning, recovery,
      presence and own direction.
    - >
      The work challenges the idea of time as an external resource that is managed with minutes, to-do
      lists and applications. Time is also a physical, biological, psychological, social and existential
      system.
    - >
      The book provides tools for planning your own time structure: what time is really spent, what breaks
      up capacity and when efficiency begins to turn into a system that eats itself.
- title: "Not just love - A guide for a man who wants a relationship that works"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with a relationship as a system where love alone is not always enough to keep the
      connection alive. Its starting point is a man's experience of a situation where something has
      stopped flowing: closeness, conversation, humor, touch or the feeling that the other person really
      sees.
    - >
      The work examines the relationship through structures, feedback, responsibility, safety and
      interaction. A relationship usually doesn't fall apart because of one big mistake, but because of
      small repeated breaks.
    - >
      The purpose of the book is not to blame the man or the partner, but to provide a model by which the
      relationship can be viewed as a system to be repaired.
- title: "Craving - Identifying and dismantling addictive systems"
  status: "RC9 / PDF Version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book treats addiction as a system, not as a moral failure or a simple lack of willpower. Lust is
      born, strengthened and maintained because it provides momentary relief, comfort, tension, a sense of
      control or an escape from unpleasant thoughts.
    - >
      The core of the work is the modeling of the addictive cycle: what the addict needs to sustain
      himself, where the reward strengthens the craving and how the environment, stress, shame,
      loneliness, boredom and impulse form a feedback loop.
    - >
      The book looks for concrete breaking points: identifying triggering situations, redirecting the
      reward, changing the environment and building structures that support recovery.
- title: "The Purpose of Life - The Meaningful Life System"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with values and purpose as a logical system. Its basic claim is that meaning is not
      just an abstract feeling that is either found or not found.
    - >
      The work starts from the fact that the era of endless possibilities promises freedom, but in
      practice can produce depression, restlessness and dissatisfaction.
    - >
      The book provides a model for how a person can recognize their own values, distinguish lasting
      meaning from momentary desire and build a framework for decision-making in their lives.
- title: "AFRS - A system for creative work"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with creative work as a system where ideas, energy, feedback, editing and completion
      must be made to work together.
    - >
      At the heart of the piece is AFRS, Adaptive Fit & Recycle System. The model helps to identify why
      creative work gets stuck: the idea does not fit the creator's current resources, feedback is not
      utilized, incompleteness becomes a burden or old material is not used.
    - >
      The book also functions as its own case study and shows how raw material is adapted, recycled,
      repaired, trimmed and turned into a finished product.
- title: "A machine that endures – when life resists"
  status: "Previous version / folder 2025"
  availability: "Reading format coming."
  description:
    - >
      The book deals with the ability to act in situations where life resists and a person cannot move
      forward with willpower alone. Its point of view is in the system, which needs to be able to start,
      withstand the load and recover from disturbances.
    - >
      The work lays the foundation for the later model of the second edition of Machine that endures: the
      examination of low power, energy leaks, reactivation and resilience as a practical operating model.
    - >
      The purpose is not to make a person tougher, but to build a system that does not collapse as soon as
      the conditions become difficult.
- title: "A Machine That Lasts - 2nd Edition"
  status: "Second edition / PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with functional capacity as a system that needs to be built to withstand both
      everyday loads and unexpected stressful situations. The problem is not always individual fatigue,
      but a structural weakness: energy leakage, wrong timing, lost momentum, low power or stuck.
    - >
      The second edition of the work expands the basic idea into a model book. The purpose is not only to
      give loose instructions, but a blueprint for identifying, anticipating and correcting one's own
      performance.
    - >
      When system weaknesses become apparent, they can be treated as protocols rather than character
      flaws.
- title: "The machinery of joy"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with joy and satisfaction as a system, not as a mere coincidence or a product of
      external circumstances. Its starting point is the observation that the constant pursuit of
      stimulation, pleasure and happiness can leave a person emptier than before.
    - >
      The work examines the joy production system through the body, nutrition, movement, brain chemistry,
      recovery and meaning.
    - >
      The goal is not to make life a constant pleasure, but to recalibrate the system so that a person
      recognizes the difference between genuine joy, low-level satisfaction, and the artificial reward of
      external approval.
- title: "Liber Obscura - The Book of Forbidden Psychostrategies"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with the dark layers of the mind, contagious thought structures and psychological
      strategies as a system map. It is not a neutral review or an idealization of manipulation, but an
      attempt to make visible mechanisms of influence that otherwise remain hidden.
    - >
      The basic movement of the work goes from deconstruction to refactoring: first the structure nested
      in the mind's architecture is identified, then its logic is dismantled and finally a more functional
      version is built in its place.
    - >
      The goal is to move from the mercy of invisible programs to a conscious administrator of your own
      operating system.
- title: "The Narcissist Interface – Analysis and Counter-Strategies"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with the narcissistic operating logic as a user interface where standard interaction
      protocols do not work as expected. A logical argument, an emotional expression, reciprocity or an
      attempt at mediation can come back as an accusation, a veil of fog, a devaluation or a
      disproportionate rage.
    - >
      The purpose of the work is to give the reader an analytical model for identifying and managing such
      interaction situations.
    - >
      The focus is not on sharing diagnoses, but on how to protect one's own system, where the limit
      should be set and why a narcissistic user interface quickly consumes another person's resources.
- title: "Operating model for Neurodiverse - Measure, Optimize, Succeed"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with neurodiversity from the point of view of the operating model. Its purpose is not
      to offer diagnoses or compartmentalize people, but to help identify how different brains,
      environments, tasks, tools, and learning styles fit together or collide with each other.
    - >
      The model of the work progresses from measurement to optimization. First, one's operational profile
      is identified: strengths, challenges, stressful situations and suitable conditions.
    - >
      After that, practical adaptations, strategies and systems are built, with the help of which
      neurodiversity does not remain just an explanation, but turns into a manageable operating
      environment.
- title: "The logic of emotions – relationship regulation systems"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with emotions and human relationships as control systems. Emotions are not just
      uncontrollable outbursts or a soft counterbalance to reason, but signals, feedback and adjustment
      movements.
    - >
      The work deconstructs the functioning of relationships through systems thinking: what happens when
      feedback does not flow, boundaries leak, interpretations are distorted, or the other person reacts
      to an old model and not to the current situation.
    - >
      The goal is to make emotional regulation and interaction less mysterious and more understandable,
      testable and correctable.
- title: "Power on - when low power strikes"
  status: "First edition / PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with low power, i.e. a state in which a person is not actually broken, but the system
      does not produce normal performance. Performance decreases, getting started becomes more difficult,
      irritability increases, withdrawal increases and even simple things begin to require a
      disproportionate amount of energy.
    - >
      The core of the work is the model of reactivation. Low power is not corrected by simply telling it
      to cheer up, but by identifying the sources of the load, restoring a little movement to the system
      and building an environment that helps to start even on weaker days.
    - >
      It's about restoring power, not heroic overachievement.
- title: "Turning Point 14 & Flow – A turning point in body and mind"
  status: "Deepened Second Edition / Manuscript 2025"
  availability: "Reading format coming."
  description:
    - >
      The book deals with a 14-day precisely defined body and metabolism repair program, the goal of which
      is to change direction quickly and measurably.
    - >
      It does not approach change as a simple diet, but as a physiological reset: a common system of body
      composition, metabolism, energy and mental clarity.
    - >
      The in-depth second edition expands the model into flow mode. The goal is not only a lighter body,
      but a more functional whole.
- title: "Retire debt-free - Make health and resilience your capital"
  status: "PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with the second half of life from the perspective of capital. Health, endurance,
      ability to function and decision-making power are not only well-being themes, but capital that
      protects freedom, which can be increased, consumed or lost.
    - >
      The central concept of the work is metabolic capital: the whole formed by the body, mind, lifestyle
      and social environment, which determines how much room for maneuver a person has under the pressure
      of age, diseases, the end of work and the care system.
    - >
      The book examines the risk of the care cycle as a systemic problem. The goal is to help the reader
      recognize how one's own freedom and ability to function can be protected before the decision-making
      power passes to symptoms, medicines, service chains or other people.
- title: "An independent young person's survival guide - Everyday code breaker"
  status: "KDP / PDF version 2025"
  availability: "PDF version available for download."
  description:
    - >
      The book deals with independence as an everyday system. Its purpose is not to romanticize freedom or
      to scare with responsibility, but to show how housing, money, food, health, paperwork, studying,
      work, relationships and crises form a whole.
    - >
      The work gives a young person a practical instruction manual for what no one necessarily has time to
      teach: how to keep basic skills, finances, decisions, authority matters and personal boundaries
      under control without each thing turning into a crisis.
    - >
      The basic idea of the book is that independence is not a feeling but a system. When the basic
      structures of everyday life are visible, freedom does not mean drifting but the ability to make
      better decisions with one's own resources.
