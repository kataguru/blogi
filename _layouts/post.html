---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%d.%m.%Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
